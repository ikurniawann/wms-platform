version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wms-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-wms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wmspassword}
      POSTGRES_DB: ${DB_NAME:-wms_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wms}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wms-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wms-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-wms}
      DB_PASSWORD: ${DB_PASSWORD:-wmspassword}
      DB_NAME: ${DB_NAME:-wms_db}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      PORT: 8080
      ENV: production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - wms-network
    restart: unless-stopped

  # Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-worker
    command: ["./wms-backend", "-worker"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-wms}
      DB_PASSWORD: ${DB_PASSWORD:-wmspassword}
      DB_NAME: ${DB_NAME:-wms_db}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - wms-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wms-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - wms-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  wms-network:
    driver: bridge
