services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wmspassword
      POSTGRES_DB: wms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wms
      DB_PASSWORD: wmspassword
      DB_NAME: wms_db
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wms
      DB_PASSWORD: wmspassword
      DB_NAME: wms_db
      DB_SSLMODE: disable
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
